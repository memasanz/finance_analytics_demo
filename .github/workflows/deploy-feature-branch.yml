name: Deploy Feature Branch Workspace

on:
  create:
    branches:
      - 'feature_*'
  workflow_dispatch:
    inputs:
      branch_name:
        description: 'Feature branch name to deploy'
        required: true
        default: 'feature_branchout'

permissions:
  id-token: write
  contents: read

env:
  FABRIC_API_BASE: https://api.fabric.microsoft.com/v1
  CAPACITY_ID: ${{ secrets.FABRIC_CAPACITY_ID }}
  GIT_CONNECTION_ID: ${{ secrets.GIT_CONNECTION_ID }}

jobs:
  deploy-and-populate:
    if: >-
      (github.event_name == 'workflow_dispatch') ||
      (github.event.ref_type == 'branch' && startsWith(github.event.ref, 'feature_'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get Fabric Access Token
        id: get-token
        run: |
          TOKEN=$(az account get-access-token --resource "https://api.fabric.microsoft.com" --query accessToken -o tsv)
          echo "::add-mask::$TOKEN"
          echo "FABRIC_TOKEN=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Create Feature Workspace
        id: create-workspace
        env:
          FABRIC_TOKEN: ${{ steps.get-token.outputs.FABRIC_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BRANCH_NAME="${{ github.event.inputs.branch_name }}"
          else
            BRANCH_NAME="${{ github.event.ref }}"
          fi
          WORKSPACE_NAME="${BRANCH_NAME}"

          echo "Creating workspace: $WORKSPACE_NAME"
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${FABRIC_API_BASE}/workspaces" \
            -H "Authorization: Bearer ${FABRIC_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"displayName\": \"${WORKSPACE_NAME}\",
              \"capacityId\": \"${CAPACITY_ID}\"
            }")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            WORKSPACE_ID=$(echo "$BODY" | jq -r '.id')
            echo "Workspace created: $WORKSPACE_ID"
            echo "WORKSPACE_ID=$WORKSPACE_ID" >> "$GITHUB_OUTPUT"
            echo "WORKSPACE_NAME=$WORKSPACE_NAME" >> "$GITHUB_OUTPUT"
          elif [ "$HTTP_CODE" = "409" ]; then
            echo "Workspace already exists. Looking up ID..."
            ALL_WS=$(curl -s \
              "${FABRIC_API_BASE}/workspaces" \
              -H "Authorization: Bearer ${FABRIC_TOKEN}" \
              -H "Content-Type: application/json")
            WORKSPACE_ID=$(echo "$ALL_WS" | jq -r --arg name "$WORKSPACE_NAME" '.value[] | select(.displayName==$name) | .id')
            echo "Found existing workspace: $WORKSPACE_ID"
            echo "WORKSPACE_ID=$WORKSPACE_ID" >> "$GITHUB_OUTPUT"
            echo "WORKSPACE_NAME=$WORKSPACE_NAME" >> "$GITHUB_OUTPUT"
          else
            echo "Failed to create workspace (HTTP $HTTP_CODE): $BODY"
            exit 1
          fi

      - name: Connect Workspace to Git Branch
        env:
          FABRIC_TOKEN: ${{ steps.get-token.outputs.FABRIC_TOKEN }}
          WORKSPACE_ID: ${{ steps.create-workspace.outputs.WORKSPACE_ID }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BRANCH_NAME="${{ github.event.inputs.branch_name }}"
          else
            BRANCH_NAME="${{ github.event.ref }}"
          fi
          OWNER_NAME="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"

          echo "Connecting workspace to branch: $BRANCH_NAME"
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${FABRIC_API_BASE}/workspaces/${WORKSPACE_ID}/git/connect" \
            -H "Authorization: Bearer ${FABRIC_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"gitProviderDetails\": {
                \"ownerName\": \"${OWNER_NAME}\",
                \"gitProviderType\": \"GitHub\",
                \"repositoryName\": \"${REPO_NAME}\",
                \"branchName\": \"${BRANCH_NAME}\",
                \"directoryName\": \"/\"
              },
              \"myGitCredentials\": {
                \"source\": \"ConfiguredConnection\",
                \"connectionId\": \"${GIT_CONNECTION_ID}\"
              }
            }")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "Workspace connected to Git successfully"
          elif [ "$HTTP_CODE" = "409" ]; then
            echo "Workspace already connected to Git (409). Continuing..."
          else
            echo "Failed to connect to Git (HTTP $HTTP_CODE): $BODY"
            exit 1
          fi

      - name: Initialize Connection and Update from Git
        env:
          FABRIC_TOKEN: ${{ steps.get-token.outputs.FABRIC_TOKEN }}
          WORKSPACE_ID: ${{ steps.create-workspace.outputs.WORKSPACE_ID }}
        run: |
          echo "Initializing Git connection..."
          INIT_RESPONSE=$(curl -s -X POST \
            "${FABRIC_API_BASE}/workspaces/${WORKSPACE_ID}/git/initializeConnection" \
            -H "Authorization: Bearer ${FABRIC_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{}")

          echo "Init response: $INIT_RESPONSE"
          REQUIRED_ACTION=$(echo "$INIT_RESPONSE" | jq -r '.requiredAction')
          REMOTE_COMMIT=$(echo "$INIT_RESPONSE" | jq -r '.remoteCommitHash')
          WORKSPACE_HEAD=$(echo "$INIT_RESPONSE" | jq -r '.workspaceHead')

          echo "Required action: $REQUIRED_ACTION"
          echo "Remote commit: $REMOTE_COMMIT"
          echo "Workspace head: $WORKSPACE_HEAD"

          if [ "$REQUIRED_ACTION" = "UpdateFromGit" ]; then
            echo "Updating workspace from Git..."
            # Build request body - omit workspaceHead if null (new workspace)
            if [ "$WORKSPACE_HEAD" = "null" ] || [ -z "$WORKSPACE_HEAD" ]; then
              UPDATE_BODY="{
                \"remoteCommitHash\": \"${REMOTE_COMMIT}\",
                \"conflictResolution\": {
                  \"conflictResolutionType\": \"Workspace\",
                  \"conflictResolutionPolicy\": \"PreferRemote\"
                },
                \"options\": {
                  \"allowOverrideItems\": true
                }
              }"
            else
              UPDATE_BODY="{
                \"remoteCommitHash\": \"${REMOTE_COMMIT}\",
                \"workspaceHead\": \"${WORKSPACE_HEAD}\",
                \"conflictResolution\": {
                  \"conflictResolutionType\": \"Workspace\",
                  \"conflictResolutionPolicy\": \"PreferRemote\"
                },
                \"options\": {
                  \"allowOverrideItems\": true
                }
              }"
            fi
            # Use -D to capture response headers for the operation ID
            HEADER_FILE=$(mktemp)
            UPDATE_RESPONSE=$(curl -s -w "\n%{http_code}" -D "$HEADER_FILE" -X POST \
              "${FABRIC_API_BASE}/workspaces/${WORKSPACE_ID}/git/updateFromGit" \
              -H "Authorization: Bearer ${FABRIC_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$UPDATE_BODY")

            HTTP_CODE=$(echo "$UPDATE_RESPONSE" | tail -1)
            BODY=$(echo "$UPDATE_RESPONSE" | sed '$d')
            echo "Update response (HTTP $HTTP_CODE): $BODY"
            echo "Response headers:"
            cat "$HEADER_FILE"

            # Try to get operation ID from response body first, then from Location header
            OPERATION_ID=$(echo "$BODY" | jq -r '.operationId // empty' 2>/dev/null)
            if [ -z "$OPERATION_ID" ]; then
              # Extract from Location header: .../operations/{id}
              LOCATION=$(grep -i "^location:" "$HEADER_FILE" | sed 's/Location: *//i' | tr -d '\r')
              echo "Location header: $LOCATION"
              OPERATION_ID=$(echo "$LOCATION" | grep -oP '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | tail -1)
            fi
            if [ -z "$OPERATION_ID" ]; then
              # Try x-ms-operation-id header
              OPERATION_ID=$(grep -i "^x-ms-operation-id:" "$HEADER_FILE" | sed 's/x-ms-operation-id: *//i' | tr -d '\r')
            fi
            rm -f "$HEADER_FILE"

            echo "Operation ID: $OPERATION_ID"

            if [ -z "$OPERATION_ID" ]; then
              echo "WARNING: No operation ID found. Waiting 120s for sync to complete..."
              sleep 120
            else
              echo "Polling for operation completion..."
              for i in $(seq 1 30); do
                sleep 20
                STATE=$(curl -s \
                  "${FABRIC_API_BASE}/operations/${OPERATION_ID}" \
                  -H "Authorization: Bearer ${FABRIC_TOKEN}" \
                  -H "Content-Type: application/json")

                STATUS=$(echo "$STATE" | jq -r '.status')
                PERCENT=$(echo "$STATE" | jq -r '.percentComplete')
                echo "Operation status: $STATUS ($PERCENT%)"

                if [ "$STATUS" = "Succeeded" ]; then
                  echo "Workspace updated from Git successfully"
                  break
                elif [ "$STATUS" = "Failed" ]; then
                  echo "Update from Git failed: $STATE"
                  exit 1
                fi
              done
            fi
          elif [ "$REQUIRED_ACTION" = "None" ]; then
            echo "No update needed - workspace is already in sync"
          fi

      - name: Wait for Items to Provision
        run: sleep 60

      - name: Get Workspace Items
        id: get-items
        env:
          FABRIC_TOKEN: ${{ steps.get-token.outputs.FABRIC_TOKEN }}
          WORKSPACE_ID: ${{ steps.create-workspace.outputs.WORKSPACE_ID }}
        run: |
          ITEMS=$(curl -s \
            "${FABRIC_API_BASE}/workspaces/${WORKSPACE_ID}/items" \
            -H "Authorization: Bearer ${FABRIC_TOKEN}" \
            -H "Content-Type: application/json")

          echo "Workspace items:"
          echo "$ITEMS" | jq '.value[] | {displayName, type, id}'

          # Extract IDs
          NB1=$(echo "$ITEMS" | jq -r '.value[] | select(.displayName=="01_Generate_Invoices" and .type=="Notebook") | .id')
          NB2=$(echo "$ITEMS" | jq -r '.value[] | select(.displayName=="02_AI_Extract_Invoices" and .type=="Notebook") | .id')
          NB3=$(echo "$ITEMS" | jq -r '.value[] | select(.displayName=="03_Silver_Gold_Layers" and .type=="Notebook") | .id')
          LAKEHOUSE_ID=$(echo "$ITEMS" | jq -r '.value[] | select(.displayName=="InvoiceLakehouse" and .type=="Lakehouse") | .id')

          echo "NB1_ID=$NB1" >> "$GITHUB_OUTPUT"
          echo "NB2_ID=$NB2" >> "$GITHUB_OUTPUT"
          echo "NB3_ID=$NB3" >> "$GITHUB_OUTPUT"
          echo "LAKEHOUSE_ID=$LAKEHOUSE_ID" >> "$GITHUB_OUTPUT"

          echo "Notebook IDs: NB1=$NB1, NB2=$NB2, NB3=$NB3"
          echo "Lakehouse ID: $LAKEHOUSE_ID"

          if [ -z "$NB1" ] || [ -z "$NB2" ] || [ -z "$NB3" ]; then
            echo "ERROR: One or more notebooks not found in workspace. Available items above."
            exit 1
          fi
          if [ -z "$LAKEHOUSE_ID" ]; then
            echo "ERROR: InvoiceLakehouse not found in workspace."
            exit 1
          fi

      - name: Update Notebook Lakehouse Bindings
        env:
          FABRIC_TOKEN: ${{ steps.get-token.outputs.FABRIC_TOKEN }}
          WORKSPACE_ID: ${{ steps.create-workspace.outputs.WORKSPACE_ID }}
          LAKEHOUSE_ID: ${{ steps.get-items.outputs.LAKEHOUSE_ID }}
        run: |
          NOTEBOOKS=("${{ steps.get-items.outputs.NB1_ID }}" "${{ steps.get-items.outputs.NB2_ID }}" "${{ steps.get-items.outputs.NB3_ID }}")
          NB_NAMES=("01_Generate_Invoices" "02_AI_Extract_Invoices" "03_Silver_Gold_Layers")

          for idx in 0 1 2; do
            NB_ID="${NOTEBOOKS[$idx]}"
            NB_NAME="${NB_NAMES[$idx]}"
            echo "=== Updating lakehouse binding for $NB_NAME ($NB_ID) ==="

            # All data flows through files to avoid shell variable size limits
            DEF_FILE=$(mktemp)
            HEADER_FILE=$(mktemp)

            # Step 1: Start getDefinition (returns 202 for async)
            HTTP_CODE=$(curl -s -o "$DEF_FILE" -w "%{http_code}" -D "$HEADER_FILE" -X POST \
              "${FABRIC_API_BASE}/workspaces/${WORKSPACE_ID}/items/${NB_ID}/getDefinition" \
              -H "Authorization: Bearer ${FABRIC_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "")
            echo "getDefinition: HTTP $HTTP_CODE"

            if [ "$HTTP_CODE" = "202" ]; then
              OP_ID=$(grep -i "^x-ms-operation-id:" "$HEADER_FILE" | sed 's/[Xx]-[Mm][Ss]-[Oo]peration-[Ii][Dd]: *//g' | tr -d '\r')
              echo "Async operation: $OP_ID"
              rm -f "$HEADER_FILE"

              # Step 2: Poll operation status
              OP_STATUS="Running"
              for i in $(seq 1 20); do
                sleep 10
                OP_STATE=$(curl -s "${FABRIC_API_BASE}/operations/${OP_ID}" -H "Authorization: Bearer ${FABRIC_TOKEN}")
                OP_STATUS=$(echo "$OP_STATE" | jq -r '.status')
                echo "  Operation status: $OP_STATUS (attempt $i)"
                if [ "$OP_STATUS" = "Succeeded" ] || [ "$OP_STATUS" = "Failed" ]; then break; fi
              done

              # Step 3: Get result directly into file
              if [ "$OP_STATUS" = "Succeeded" ]; then
                curl -s -o "$DEF_FILE" \
                  "${FABRIC_API_BASE}/workspaces/${WORKSPACE_ID}/items/${NB_ID}/getDefinition/result/${OP_ID}" \
                  -H "Authorization: Bearer ${FABRIC_TOKEN}"
                echo "Got definition from result endpoint"
              else
                echo "WARNING: getDefinition failed for $NB_NAME. Skipping."
                rm -f "$DEF_FILE" "$HEADER_FILE" 2>/dev/null
                continue
              fi
            elif [ "$HTTP_CODE" != "200" ]; then
              echo "Unexpected status: HTTP $HTTP_CODE"
              cat "$DEF_FILE"
              rm -f "$DEF_FILE" "$HEADER_FILE" 2>/dev/null
              continue
            fi
            rm -f "$HEADER_FILE" 2>/dev/null

            # Step 4: Extract notebook content payload from definition file to a raw file, decode, modify
            CONTENT_B64_FILE=$(mktemp)
            CONTENT_FILE=$(mktemp)
            jq -r '.definition.parts[] | select(.path=="notebook-content.py") | .payload' "$DEF_FILE" > "$CONTENT_B64_FILE" 2>/dev/null

            if [ ! -s "$CONTENT_B64_FILE" ] || [ "$(head -c 4 "$CONTENT_B64_FILE")" = "null" ]; then
              echo "WARNING: Could not get notebook content for $NB_NAME. Skipping."
              rm -f "$DEF_FILE" "$CONTENT_B64_FILE" "$CONTENT_FILE" 2>/dev/null
              continue
            fi

            # Decode base64 to file
            base64 -d < "$CONTENT_B64_FILE" > "$CONTENT_FILE"
            rm -f "$CONTENT_B64_FILE"

            # Replace lakehouse IDs in-place in the file
            sed -i "s/\"default_lakehouse\": \"[^\"]*\"/\"default_lakehouse\": \"${LAKEHOUSE_ID}\"/g" "$CONTENT_FILE"
            sed -i "s/\"default_lakehouse_workspace_id\": \"[^\"]*\"/\"default_lakehouse_workspace_id\": \"${WORKSPACE_ID}\"/g" "$CONTENT_FILE"
            sed -i "s/\"id\": \"[0-9a-f]\{8\}-[0-9a-f]\{4\}-[0-9a-f]\{4\}-[0-9a-f]\{4\}-[0-9a-f]\{12\}\"/\"id\": \"${LAKEHOUSE_ID}\"/g" "$CONTENT_FILE"

            # Re-encode to base64 file
            UPDATED_B64_FILE=$(mktemp)
            base64 -w 0 < "$CONTENT_FILE" > "$UPDATED_B64_FILE"
            rm -f "$CONTENT_FILE"

            # Extract platform payload to file
            PLATFORM_B64_FILE=$(mktemp)
            jq -r '.definition.parts[] | select(.path==".platform") | .payload' "$DEF_FILE" > "$PLATFORM_B64_FILE"
            rm -f "$DEF_FILE"

            # Step 5: Build update body using jq with --rawfile (reads file contents as string)
            UPDATE_FILE=$(mktemp)
            jq -n \
              --rawfile nb_payload "$UPDATED_B64_FILE" \
              --rawfile plat_payload "$PLATFORM_B64_FILE" \
              '{
                "definition": {
                  "parts": [
                    {"path": "notebook-content.py", "payload": ($nb_payload | rtrimstr("\n")), "payloadType": "InlineBase64"},
                    {"path": ".platform", "payload": ($plat_payload | rtrimstr("\n")), "payloadType": "InlineBase64"}
                  ]
                }
              }' > "$UPDATE_FILE"
            rm -f "$UPDATED_B64_FILE" "$PLATFORM_B64_FILE"

            echo "Update body size: $(wc -c < "$UPDATE_FILE") bytes"

            # Step 6: Send update
            UPD_HEADER=$(mktemp)
            UPD_RESP_FILE=$(mktemp)
            HTTP_CODE=$(curl -s -o "$UPD_RESP_FILE" -w "%{http_code}" -D "$UPD_HEADER" -X POST \
              "${FABRIC_API_BASE}/workspaces/${WORKSPACE_ID}/items/${NB_ID}/updateDefinition" \
              -H "Authorization: Bearer ${FABRIC_TOKEN}" \
              -H "Content-Type: application/json" \
              -d @"$UPDATE_FILE")
            rm -f "$UPDATE_FILE"
            echo "updateDefinition: HTTP $HTTP_CODE"

            if [ "$HTTP_CODE" = "200" ]; then
              echo "Notebook $NB_NAME updated successfully"
            elif [ "$HTTP_CODE" = "202" ]; then
              UPD_OP_ID=$(grep -i "^x-ms-operation-id:" "$UPD_HEADER" | sed 's/[Xx]-[Mm][Ss]-[Oo]peration-[Ii][Dd]: *//g' | tr -d '\r')
              echo "Update async operation: $UPD_OP_ID"
              for j in $(seq 1 15); do
                sleep 10
                UPD_STATE=$(curl -s "${FABRIC_API_BASE}/operations/${UPD_OP_ID}" -H "Authorization: Bearer ${FABRIC_TOKEN}")
                UPD_STATUS=$(echo "$UPD_STATE" | jq -r '.status')
                echo "  Update status: $UPD_STATUS"
                if [ "$UPD_STATUS" = "Succeeded" ] || [ "$UPD_STATUS" = "Failed" ]; then break; fi
              done
              echo "Notebook $NB_NAME update completed: $UPD_STATUS"
            else
              echo "WARNING: Failed to update $NB_NAME (HTTP $HTTP_CODE):"
              cat "$UPD_RESP_FILE"
            fi
            rm -f "$UPD_HEADER" "$UPD_RESP_FILE" 2>/dev/null
          done

          echo "Lakehouse binding update complete"

      - name: Run Notebook - 01_Generate_Invoices
        env:
          FABRIC_TOKEN: ${{ steps.get-token.outputs.FABRIC_TOKEN }}
          WORKSPACE_ID: ${{ steps.create-workspace.outputs.WORKSPACE_ID }}
          NOTEBOOK_ID: ${{ steps.get-items.outputs.NB1_ID }}
        run: |
          echo "Running notebook: 01_Generate_Invoices ($NOTEBOOK_ID)"
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${FABRIC_API_BASE}/workspaces/${WORKSPACE_ID}/items/${NOTEBOOK_ID}/jobs/instances?jobType=RunNotebook" \
            -H "Authorization: Bearer ${FABRIC_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "Started (HTTP $HTTP_CODE)"

          # Poll for job completion
          LOCATION=$(echo "$BODY" | jq -r '.location // empty')
          for i in $(seq 1 60); do
            sleep 30
            JOB_STATUS=$(curl -s \
              "${FABRIC_API_BASE}/workspaces/${WORKSPACE_ID}/items/${NOTEBOOK_ID}/jobs/instances?limit=1" \
              -H "Authorization: Bearer ${FABRIC_TOKEN}" \
              -H "Content-Type: application/json")

            STATUS=$(echo "$JOB_STATUS" | jq -r '.value[0].status')
            echo "Notebook job status: $STATUS"

            if [ "$STATUS" = "Completed" ]; then
              echo "Notebook 01 completed successfully"
              break
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "Notebook 01 failed: $JOB_STATUS"
              exit 1
            fi
          done

      - name: Run Notebook - 02_AI_Extract_Invoices
        env:
          FABRIC_TOKEN: ${{ steps.get-token.outputs.FABRIC_TOKEN }}
          WORKSPACE_ID: ${{ steps.create-workspace.outputs.WORKSPACE_ID }}
          NOTEBOOK_ID: ${{ steps.get-items.outputs.NB2_ID }}
        run: |
          echo "Running notebook: 02_AI_Extract_Invoices ($NOTEBOOK_ID)"
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${FABRIC_API_BASE}/workspaces/${WORKSPACE_ID}/items/${NOTEBOOK_ID}/jobs/instances?jobType=RunNotebook" \
            -H "Authorization: Bearer ${FABRIC_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          echo "Started (HTTP $HTTP_CODE)"

          for i in $(seq 1 60); do
            sleep 30
            JOB_STATUS=$(curl -s \
              "${FABRIC_API_BASE}/workspaces/${WORKSPACE_ID}/items/${NOTEBOOK_ID}/jobs/instances?limit=1" \
              -H "Authorization: Bearer ${FABRIC_TOKEN}" \
              -H "Content-Type: application/json")

            STATUS=$(echo "$JOB_STATUS" | jq -r '.value[0].status')
            echo "Notebook job status: $STATUS"

            if [ "$STATUS" = "Completed" ]; then
              echo "Notebook 02 completed successfully"
              break
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "Notebook 02 failed: $JOB_STATUS"
              exit 1
            fi
          done

      - name: Run Notebook - 03_Silver_Gold_Layers
        env:
          FABRIC_TOKEN: ${{ steps.get-token.outputs.FABRIC_TOKEN }}
          WORKSPACE_ID: ${{ steps.create-workspace.outputs.WORKSPACE_ID }}
          NOTEBOOK_ID: ${{ steps.get-items.outputs.NB3_ID }}
        run: |
          echo "Running notebook: 03_Silver_Gold_Layers ($NOTEBOOK_ID)"
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${FABRIC_API_BASE}/workspaces/${WORKSPACE_ID}/items/${NOTEBOOK_ID}/jobs/instances?jobType=RunNotebook" \
            -H "Authorization: Bearer ${FABRIC_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          echo "Started (HTTP $HTTP_CODE)"

          for i in $(seq 1 60); do
            sleep 30
            JOB_STATUS=$(curl -s \
              "${FABRIC_API_BASE}/workspaces/${WORKSPACE_ID}/items/${NOTEBOOK_ID}/jobs/instances?limit=1" \
              -H "Authorization: Bearer ${FABRIC_TOKEN}" \
              -H "Content-Type: application/json")

            STATUS=$(echo "$JOB_STATUS" | jq -r '.value[0].status')
            echo "Notebook job status: $STATUS"

            if [ "$STATUS" = "Completed" ]; then
              echo "Notebook 03 completed successfully"
              break
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "Notebook 03 failed: $JOB_STATUS"
              exit 1
            fi
          done

      - name: Deployment Summary
        env:
          WORKSPACE_ID: ${{ steps.create-workspace.outputs.WORKSPACE_ID }}
          WORKSPACE_NAME: ${{ steps.create-workspace.outputs.WORKSPACE_NAME }}
        run: |
          echo "## Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Workspace | ${WORKSPACE_NAME} |" >> $GITHUB_STEP_SUMMARY
          echo "| Workspace ID | ${WORKSPACE_ID} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.event.ref }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Notebooks Executed | 01_Generate_Invoices, 02_AI_Extract_Invoices, 03_Silver_Gold_Layers |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All notebooks ran successfully. Data has been populated in the feature lakehouse." >> $GITHUB_STEP_SUMMARY
